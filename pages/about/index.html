            async simulateLoading() {
                const progressFill = document.querySelector('.progress-fill');
                const loadingStatus = document.querySelector('.loading-status');
                const loadingPercent = document.querySelector('.loading-percent');
                const loadingOverlay = document.getElementById('loading-overlay');
                const appContainer = document.getElementById('app');
                
                const steps = [

                    { text: 'INITIALIZING BIOGRAPHY...', progress: 40 },
                    { text: 'LOADING EXPERIENCES...', progress: 60 },
                    { text: 'COMPILING SKILLS...', progress: 80 },
                    { text: 'SYSTEM READY!', progress: 100 }
                ];
                
                let currentProgress = 0;
                
                for (const step of steps) {
                    loadingStatus.textContent = step.text;
                    
                    for (let i = currentProgress; i <= step.progress; i++) {
                        progressFill.style.width = `${i}%`;
                        loadingPercent.textContent = `${i}%`;
                        await this.delay(20);
                    }
                    
                    currentProgress = step.progress;
                }
                
                loadingOverlay.style.opacity = '0';
                await this.delay(300);
                loadingOverlay.style.display = 'none';
                appContainer.style.opacity = '1';
            }

            initParticleSystem() {
                const container = document.querySelector('.particle-container');
                if (!container) return;
                
                const particleCount = 20;
                const colors = ['#00ffea', '#ff00ff', '#00ff9d'];
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    
                    const size = Math.random() * 3 + 1;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    const duration = Math.random() * 4 + 2;
                    const delay = Math.random() * 2;
                    
                    particle.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${color};
                        border-radius: 50%;
                        left: ${x}%;
                        top: ${y}%;
                        opacity: ${Math.random() * 0.3 + 0.1};
                        animation: float ${duration}s ease-in-out infinite;
                        animation-delay: ${delay}s;
                        filter: blur(1px);
                    `;
                    
                    container.appendChild(particle);
                }
            }
            
            animateNumbers() {
                const counters = document.querySelectorAll('.stat-number');
                counters.forEach(counter => {
                    const target = parseInt(counter.dataset.count);
                    const duration = 2000;
                    const startTime = Date.now();
                    
                    const animate = () => {
                        const currentTime = Date.now();
                        const elapsed = currentTime - startTime;
                        const progress = Math.min(elapsed / duration, 1);
                        
                        const value = Math.floor(progress * target);
                        counter.textContent = value;
                        
                        if (progress < 1) {
                            requestAnimationFrame(animate);
                        }
                    };
                    
                    // 延迟开始动画
                    setTimeout(animate, 500);
                });
            }

                const skillBars = document.querySelectorAll('.skill-bar');

                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const skillBar = entry.target;
                            const level = skillBar.dataset.level;
                            
                            skillBar.style.width = '0%';
                            
                            setTimeout(() => {
                                skillBar.style.width = level + '%';
                            }, 300);
                            
                            observer.unobserve(skillBar);
                        }
                    });
                }, { threshold: 0.5 });
                
                skillBars.forEach(bar => observer.observe(bar));
            }
            
            initAnimations() {
                // 时间线动画
                const timelineItems = document.querySelectorAll('.timeline-item');
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('animate-in');
                        }
                    });
                }, { threshold: 0.1 });
                
                timelineItems.forEach(item => observer.observe(item));
                
                // 兴趣卡片动画
                const interestCards = document.querySelectorAll('.interest-card');
                interestCards.forEach((card, index) => {
                    card.style.setProperty('--delay', `${index * 0.1}s`);
                    observer.observe(card);
                });
            }
            
            delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            new AboutPageLoader();
            
            // 添加样式
            const style = document.createElement('style');
            style.textContent = `
                .skills-category {
                    margin-bottom: var(--spacing-xl);
                }
                
                .skills-category h3 {
                    color: var(--primary);
                    margin-bottom: var(--spacing-md);
                    font-family: var(--font-heading);
                }
                
                .skills-grid {
                    display: flex;
                    flex-direction: column;
                    gap: var(--spacing-md);
                }
                
                .skill-item {
                    display: grid;
                    grid-template-columns: 150px 1fr 60px;
                    align-items: center;
                    gap: var(--spacing-md);
                }
                
                .skill-name {
                    color: var(--text-secondary);
                }
                
                .skill-bar-container {
                    height: 8px;
                    background: var(--bg-gray);
                    border-radius: 4px;
                    overflow: hidden;
                }
                
                .skill-bar {
                    height: 100%;
                    background: linear-gradient(90deg, var(--primary), var(--secondary));
                    border-radius: 4px;
                    width: 0;
                    transition: width 1.5s ease;
                }
                
                .skill-percent {
                    text-align: right;
                    color: var(--primary);
                    font-family: var(--font-body);
                    font-weight: 600;
                }
                
                .timeline {
                    position: relative;
                    max-width: 800px;
                    margin: 0 auto;
                }
                
                .timeline::before {
                    content: '';
                    position: absolute;
                    left: 30px;
                    top: 0;
                    bottom: 0;
                    width: 2px;
                    background: var(--border-color);
                }
                
                .timeline-item {
                    display: grid;
                    grid-template-columns: 60px 1fr;
                    gap: var(--spacing-lg);
                    margin-bottom: var(--spacing-xl);
                    position: relative;
                    opacity: 0;
                    transform: translateX(-20px);
                    transition: all 0.6s ease;
                }
                
                .timeline-item.animate-in {
                    opacity: 1;
                    transform: translateX(0);
                }
                
                .timeline-item::before {
                    content: '';
                    position: absolute;
                    left: 24px;
                    top: 0;
                    width: 12px;
                    height: 12px;
                    background: var(--primary);
                    border-radius: 50%;
                    z-index: 1;
                }
                
                .timeline-date {
                    text-align: right;
                    color: var(--primary);
                    font-family: var(--font-heading);
                    font-weight: 600;
                }
                
                .timeline-content {
                    padding: var(--spacing-md);
                    background: rgba(255, 255, 255, 0.05);
                    border: 1px solid var(--border-color);
                    border-radius: var(--border-radius-md);
                }
                
                .timeline-content h3 {
                    color: var(--text-primary);
                    margin-bottom: var(--spacing-sm);
                }
                
                .interest-card {
                    opacity: 0;
                    transform: translateY(20px);
                    transition: all 0.6s ease var(--delay, 0s);
                }
                
                .interest-card.animate-in {
                    opacity: 1;
                    transform: translateY(0);
                }
                
                @media (max-width: 768px) {
                    .skill-item {
                        grid-template-columns: 1fr;
                        gap: var(--spacing-sm);
                    }
                    
                    .timeline {
                        padding-left: 20px;
                    }
                    
                    .timeline::before {
                        left: 10px;
                    }
                    
                    .timeline-item {
                        grid-template-columns: 1fr;
                    }
                    
                    .timeline-item::before {
                        left: 4px;
                    }
                    
                    .timeline-date {
                        text-align: left;
                        order: 2;
                        margin-top: var(--spacing-sm);
                    }
                }
            `;
            document.head.appendChild(style);
        });
    </script>
</body>
