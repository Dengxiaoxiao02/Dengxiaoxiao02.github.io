<script>
    // 卡片交互
    document.addEventListener('DOMContentLoaded', function() {
        // 交互卡片展开/收起
        const interactiveCard = document.querySelector('.interactive-card');
        const cardToggle = interactiveCard?.querySelector('.card-toggle');
        
        if (cardToggle) {
            cardToggle.addEventListener('click', function() {
                interactiveCard.classList.toggle('expanded');
                this.classList.toggle('active');
                
                const icon = this.querySelector('i');
                if (interactiveCard.classList.contains('expanded')) {
                    icon.className = 'fas fa-chevron-up';
                } else {
                    icon.className = 'fas fa-chevron-down';
                }
            });
        }
        
        // 卡片悬停效果
        const cards = document.querySelectorAll('.cyber-card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.zIndex = '10';
            });
            
            card.addEventListener('mouseleave', function() {
                this.style.zIndex = '1';
            });
        });
        
        // 模拟数据更新
        const dataItems = document.querySelectorAll('.data-item');
        dataItems.forEach(item => {
            const progressBar = item.querySelector('.progress-bar');
            const dataValue = item.querySelector('.data-value');
            
            if (progressBar && dataValue) {
                const currentWidth = parseInt(progressBar.style.width);
                const targetWidth = Math.floor(Math.random() * 30) + 50; // 50-80%
                
                let width = currentWidth || 0;
                const interval = setInterval(() => {
                    if (width < targetWidth) {
                        width += 1;
                        progressBar.style.width = width + '%';
                        dataValue.textContent = width + '%';
                    } else {
                        clearInterval(interval);
                    }
                }, 20);
            }
        });
    });
</script>
