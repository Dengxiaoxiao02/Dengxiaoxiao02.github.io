<!-- 赛博风格按钮组件 -->
<div class="cyber-buttons-demo">
    <h3>按钮组件库</h3>
    
    <div class="button-showcase">
        <button class="cyber-btn primary">
            <i class="fas fa-rocket"></i>
            <span>主要按钮</span>
        </button>
        
        <button class="cyber-btn secondary">
            <i class="fas fa-code"></i>
            <span>次要按钮</span>
        </button>
        
        <button class="cyber-btn accent">
            <i class="fas fa-magic"></i>
            <span>强调按钮</span>
        </button>
        
        <button class="cyber-btn ghost">
            <i class="fas fa-ghost"></i>
            <span>幽灵按钮</span>
        </button>
        
        <button class="cyber-btn small">
            <i class="fas fa-star"></i>
            <span>小按钮</span>
        </button>
        
        <button class="cyber-btn large">
            <i class="fas fa-expand"></i>
            <span>大按钮</span>
        </button>
        
        <button class="cyber-btn disabled" disabled>
            <i class="fas fa-ban"></i>
            <span>禁用按钮</span>
        </button>
        
        <button class="cyber-btn loading">
            <i class="fas fa-spinner fa-spin"></i>
            <span>加载中</span>
        </button>
    </div>
    
    <div class="button-variants">
        <h4>按钮变体</h4>
        <div class="variant-grid">
            <button class="cyber-btn outline">
                <i class="fas fa-square"></i>
                <span>描边</span>
            </button>
            
            <button class="cyber-btn rounded">
                <i class="fas fa-circle"></i>
                <span>圆角</span>
            </button>
            
            <button class="cyber-btn pill">
                <i class="fas fa-capsules"></i>
                <span>胶囊</span>
            </button>
            
            <button class="cyber-btn icon-only">
                <i class="fas fa-heart"></i>
            </button>
            
            <button class="cyber-btn with-badge">
                <i class="fas fa-bell"></i>
                <span>通知</span>
                <span class="btn-badge">3</span>
            </button>
        </div>
    </div>
</div>

<style>
    .cyber-buttons-demo {
        padding: var(--spacing-xl);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        margin: var(--spacing-xl) 0;
    }
    
    .cyber-buttons-demo h3 {
        color: var(--primary);
        margin-bottom: var(--spacing-lg);
        font-family: var(--font-heading);
    }
    
    .cyber-buttons-demo h4 {
        color: var(--text-secondary);
        margin: var(--spacing-xl) 0 var(--spacing-lg);
    }
    
    .button-showcase {
        display: flex;
        flex-wrap: wrap;
        gap: var(--spacing-md);
        margin-bottom: var(--spacing-xl);
    }
    
    .variant-grid {
        display: flex;
        flex-wrap: wrap;
        gap: var(--spacing-md);
    }
    
    /* 基础按钮样式 */
    .cyber-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-lg);
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 500;
        border: 2px solid;
        border-radius: var(--border-radius-md);
        cursor: pointer;
        transition: all var(--transition-normal);
        position: relative;
        overflow: hidden;
        outline: none;
        text-decoration: none;
        user-select: none;
    }
    
    /* 按钮变体 */
    .cyber-btn.primary {
        background: var(--primary);
        border-color: var(--primary);
        color: var(--bg-dark);
    }
    
    .cyber-btn.secondary {
        background: var(--secondary);
        border-color: var(--secondary);
        color: var(--bg-dark);
    }
    
    .cyber-btn.accent {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--bg-dark);
    }
    
    .cyber-btn.ghost {
        background: transparent;
        border-color: var(--border-color);
        color: var(--text-primary);
    }
    
    .cyber-btn.outline {
        background: transparent;
        border-color: var(--primary);
        color: var(--primary);
    }
    
    /* 尺寸变体 */
    .cyber-btn.small {
        padding: var(--spacing-xs) var(--spacing-md);
        font-size: 0.8rem;
    }
    
    .cyber-btn.large {
        padding: var(--spacing-md) var(--spacing-xl);
        font-size: 1rem;
    }
    
    /* 形状变体 */
    .cyber-btn.rounded {
        border-radius: var(--border-radius-lg);
    }
    
    .cyber-btn.pill {
        border-radius: 50px;
    }
    
    .cyber-btn.icon-only {
        width: 40px;
        height: 40px;
        padding: 0;
        border-radius: 50%;
    }
    
    /* 特殊状态 */
    .cyber-btn.disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .cyber-btn.loading {
        cursor: wait;
    }
    
    /* 徽章按钮 */
    .cyber-btn.with-badge {
        position: relative;
    }
    
    .btn-badge {
        position: absolute;
        top: -8px;
        right: -8px;
        background: var(--secondary);
        color: var(--bg-dark);
        font-size: 0.7rem;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    /* 悬停效果 */
    .cyber-btn:not(.disabled):not(.loading):hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow-glow);
    }
    
    .cyber-btn.primary:hover {
        background: transparent;
        color: var(--primary);
    }
    
    .cyber-btn.secondary:hover {
        background: transparent;
        color: var(--secondary);
    }
    
    .cyber-btn.accent:hover {
        background: transparent;
        color: var(--accent);
    }
    
    .cyber-btn.ghost:hover {
        background: rgba(100, 255, 218, 0.1);
        border-color: var(--primary);
    }
    
    .cyber-btn.outline:hover {
        background: var(--primary);
        color: var(--bg-dark);
    }
    
    /* 激活状态 */
    .cyber-btn:active {
        transform: translateY(0);
    }
    
    /* 点击波纹效果 */
    .cyber-btn::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0;
        height: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        transform: translate(-50%, -50%);
        transition: width 0.3s, height 0.3s;
    }
    
    .cyber-btn:active::after {
        width: 200px;
        height: 200px;
    }
</style>

<script>
    // 按钮交互效果
    document.addEventListener('DOMContentLoaded', function() {
        const buttons = document.querySelectorAll('.cyber-btn:not(.disabled):not(.loading)');
        
        buttons.forEach(button => {
            // 点击效果
            button.addEventListener('click', function(e) {
                if (this.classList.contains('disabled') || this.classList.contains('loading')) {
                    e.preventDefault();
                    return;
                }
                
                // 添加点击反馈
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = '';
                }, 150);
                
                // 显示点击消息
                const btnText = this.querySelector('span')?.textContent || '按钮';
                console.log(`${btnText} 被点击`);
            });
            
            // 悬停音效
            button.addEventListener('mouseenter', function() {
                if (window.cyberLoader) {
                    window.cyberLoader.showNotification('按钮交互就绪');
                }
            });
        });
    });
</script>
