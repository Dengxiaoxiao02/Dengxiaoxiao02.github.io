<script>
    // 访客计数器
    document.addEventListener('DOMContentLoaded', function() {
        const countElement = document.getElementById('visitor-count');
        let count = localStorage.getItem('visitorCount') || 1000;
        
        // 模拟访客数增加
        count = parseInt(count) + Math.floor(Math.random() * 10) + 1;
        localStorage.setItem('visitorCount', count);
        
        // 数字滚动效果
        let current = 0;
        const increment = Math.ceil(count / 50);
        const timer = setInterval(() => {
            current += increment;
            if (current >= count) {
                current = count;
                clearInterval(timer);
            }
            countElement.textContent = `访客: ${current.toLocaleString()}`;
        }, 30);
        
        // 通讯表单
        const newsletterForm = document.getElementById('newsletter-form');
        if (newsletterForm) {
            newsletterForm.addEventListener('submit', function(e) {
                e.preventDefault();
                const email = this.querySelector('input[type="email"]').value;
                
                // 模拟提交
                const submitBtn = this.querySelector('button[type="submit"]');
                const originalHTML = submitBtn.innerHTML;
                
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                submitBtn.disabled = true;
                
                setTimeout(() => {
                    submitBtn.innerHTML = '<i class="fas fa-check"></i>';
                    
                    // 显示成功消息
                    const notification = document.getElementById('system-notification') || 
                        (function() {
                            const notif = document.createElement('div');
                            notif.id = 'system-notification';
                            notif.className = 'system-notification';
                            notif.innerHTML = `
                                <div class="notification-content">
                                    <i class="fas fa-terminal"></i>
                                    <span class="notification-text"></span>
                                </div>
                            `;
                            document.body.appendChild(notif);
                            return notif;
                        })();
                    
                    const notifText = notification.querySelector('.notification-text');
                    notifText.textContent = `感谢订阅！确认邮件已发送至 ${email}`;
                    notification.classList.add('show');
                    
                    setTimeout(() => {
                        notification.classList.remove('show');
                        submitBtn.innerHTML = originalHTML;
                        submitBtn.disabled = false;
                        newsletterForm.reset();
                    }, 3000);
                }, 1500);
            });
        }
    });
</script>
