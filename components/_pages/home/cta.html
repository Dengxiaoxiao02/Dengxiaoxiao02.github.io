<section class="cyber-cta">
    <div class="cta-container">
        <div class="cta-content">
            <h2 class="cta-title">准备好一起创造了吗？</h2>
            <p class="cta-description">
                无论你是有趣的项目想法，还是想交流技术，或是单纯想交个朋友，
                我都非常欢迎你的联系！
            </p>
            <div class="cta-actions">
                <a href="pages/contact/" class="cyber-btn primary large">
                    <i class="fas fa-paper-plane"></i>
                    <span>发送消息</span>
                </a>
                <a href="pages/portfolio/" class="cyber-btn secondary large">
                    <i class="fas fa-eye"></i>
                    <span>查看作品</span>
                </a>
            </div>
        </div>
        <div class="cta-visual">
            <div class="cyber-terminal">
                <div class="terminal-header">
                    <div class="terminal-buttons">
                        <span class="term-btn close"></span>
                        <span class="term-btn minimize"></span>
                        <span class="term-btn maximize"></span>
                    </div>
                    <div class="terminal-title">terminal@cyber-space:~</div>
                </div>
                <div class="terminal-body">
                    <div class="terminal-content">
                        <p><span class="term-prompt">$</span> connect --to visitor</p>
                        <p><span class="term-output">正在建立连接...</span></p>
                        <p><span class="term-output">✓ 连接成功！</span></p>
                        <p><span class="term-prompt">$</span> send --message "你好！"</p>
                        <p><span class="term-output">消息已发送 ✓</span></p>
                        <p><span class="term-prompt">$</span> <span class="cursor">█</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .cyber-cta {
        padding: var(--spacing-xxl) var(--spacing-xl);
        position: relative;
    }
    
    .cta-container {
        max-width: 1400px;
        margin: 0 auto;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: var(--spacing-xxl);
        align-items: center;
    }
    
    .cta-content {
        padding-right: var(--spacing-xl);
    }
    
    .cta-title {
        font-family: var(--font-heading);
        font-size: 2.5rem;
        color: var(--text-primary);
        margin-bottom: var(--spacing-lg);
        line-height: 1.2;
    }
    
    .cta-description {
        font-size: 1.1rem;
        color: var(--text-secondary);
        line-height: 1.6;
        margin-bottom: var(--spacing-xl);
    }
    
    .cta-actions {
        display: flex;
        gap: var(--spacing-md);
        flex-wrap: wrap;
    }
    
    .cyber-btn.large {
        padding: var(--spacing-md) var(--spacing-xl);
        font-size: 1rem;
    }
    
    /* 终端样式 */
    .cyber-terminal {
        background: var(--bg-dark);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-lg);
    }
    
    .terminal-header {
        background: var(--bg-darker);
        padding: var(--spacing-sm) var(--spacing-md);
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border-color);
    }
    
    .terminal-buttons {
        display: flex;
        gap: var(--spacing-sm);
    }
    
    .term-btn {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
    }
    
    .term-btn.close {
        background: #ff5f57;
    }
    
    .term-btn.minimize {
        background: #ffbd2e;
    }
    
    .term-btn.maximize {
        background: #28ca42;
    }
    
    .terminal-title {
        font-family: var(--font-body);
        font-size: 0.8rem;
        color: var(--text-muted);
    }
    
    .terminal-body {
        padding: var(--spacing-lg);
    }
    
    .terminal-content {
        font-family: var(--font-body);
        font-size: 0.9rem;
    }
    
    .term-prompt {
        color: var(--primary);
        font-weight: 600;
    }
    
    .term-output {
        color: var(--text-secondary);
    }
    
    .cursor {
        animation: blink 1s infinite;
        color: var(--primary);
    }
    
    @media (max-width: 768px) {
        .cta-container {
            grid-template-columns: 1fr;
            gap: var(--spacing-xl);
        }
        
        .cta-content {
            padding-right: 0;
        }
        
        .cta-title {
            font-size: 2rem;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const terminal = document.querySelector('.cyber-terminal');
        const cursor = document.querySelector('.cursor');
        
        if (terminal && cursor) {
            // 模拟终端输入
            const messages = [
                "欢迎来到我的数字空间！",
                "我正在探索前端开发与创意编程的交汇点。",
                "对新技术和设计趋势充满热情。",
                "随时可以联系我交流想法！"
            ];
            
            let messageIndex = 0;
            let charIndex = 0;
            let isDeleting = false;
            
            function typeEffect() {
                const currentMessage = messages[messageIndex];
                
                if (!isDeleting && charIndex <= currentMessage.length) {
                    cursor.insertAdjacentText('beforebegin', currentMessage.charAt(charIndex - 1));
                    charIndex++;
                    setTimeout(typeEffect, 50);
                } else if (isDeleting && charIndex >= 0) {
                    const text = cursor.previousSibling;
                    if (text) {
                        text.remove();
                    }
                    charIndex--;
                    setTimeout(typeEffect, 30);
                } else {
                    isDeleting = !isDeleting;
                    if (!isDeleting) {
                        messageIndex = (messageIndex + 1) % messages.length;
                    }
                    setTimeout(typeEffect, 1000);
                }
            }
            
            // 延迟开始打字效果
            setTimeout(() => {
                cursor.textContent = '';
                typeEffect();
            }, 2000);
        }
    });
</script>
